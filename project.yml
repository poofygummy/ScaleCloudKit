name: ScaleCloudKit
packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    from: 5.12.0
  SwiftyJSON:
    url: https://github.com/SwiftyJSON/SwiftyJSON.git
    from: 5.0.2
  SwiftyXMLParser:
    url: https://github.com/yahoojapan/SwiftyXMLParser.git
    from: 5.6.0
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "14.0"
targets:
  ScaleCloudKit:
    type: framework
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    dependencies:
      - target: ScaleCloudGo/ScaleCloudGo
      - package: Alamofire
      - package: SwiftyJSON
      - package: SwiftyXMLParser
projectReferences:
  ScaleCloudGo:
    path: ../ScaleCloudGo/ScaleCloudGo.xcodeproj
